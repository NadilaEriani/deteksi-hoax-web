<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Statistik & Performa - Deteksi Hoaks</title>
    <link rel="stylesheet" href="/static/style.css" />

    <style>
      .statistics-wrapper {
        padding: 48px 28px;
      }

      .performance-card-main {
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        padding: 24px;
      }

      .performance-title {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #087e70;
        margin-bottom: 26px;
      }

      .performance-title h3 {
        font-size: 20px;
        color: #2d3b42;
        font-weight: 800;
      }

      .performance-content {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        gap: 42px;
        align-items: center;
        margin-bottom: 28px;
      }

      .metric-chart-box {
        min-height: 290px;
      }

      .metric-chart-title,
      .pie-chart-title {
        text-align: center;
        font-size: 14px;
        color: #3b4a52;
        font-weight: 800;
        margin-bottom: 18px;
      }

      .metric-chart {
        height: 230px;
        display: grid;
        grid-template-columns: 44px 1fr;
        gap: 14px;
      }

      .metric-y-axis {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: flex-end;
        font-size: 11px;
        color: #8b9aa1;
        padding-bottom: 28px;
      }

      .metric-bars {
        border-left: 1px dashed #d9e3e0;
        border-bottom: 1px solid #d9e3e0;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 24px;
        align-items: end;
        padding: 0 18px;
        background-image:
          linear-gradient(
            to top,
            transparent 24%,
            rgba(120, 140, 150, 0.13) 25%,
            transparent 26%
          ),
          linear-gradient(
            to right,
            transparent 24%,
            rgba(120, 140, 150, 0.1) 25%,
            transparent 26%
          );
        background-size:
          100% 46px,
          90px 100%;
      }

      .metric-bar-item {
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: center;
        gap: 9px;
        cursor: pointer;
      }

      .metric-bar {
        width: 76px;
        min-height: 4px;
        background: #20b8aa;
        border-radius: 3px 3px 0 0;
        transition:
          height 0.35s ease,
          transform 0.2s ease,
          filter 0.2s ease,
          box-shadow 0.2s ease;
      }

      .metric-bar-item:hover .metric-bar {
        transform: scaleY(1.04);
        filter: brightness(1.05);
        box-shadow: 0 0 0 4px rgba(32, 184, 170, 0.12);
      }

      .metric-bar-item span {
        font-size: 11px;
        color: #687a82;
        transition: color 0.2s ease;
      }

      .metric-bar-item:hover span {
        color: #087e70;
        font-weight: 800;
      }

      .metric-legend {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        font-size: 12px;
        color: #08a998;
        margin-top: 10px;
        font-weight: 700;
      }

      .metric-legend b {
        width: 12px;
        height: 9px;
        background: #20b8aa;
        border-radius: 2px;
        display: inline-block;
      }

      .dataset-distribution {
        min-height: 290px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .pie-area {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
        justify-items: center;
      }

      .pie-wrap {
        width: 205px;
        height: 205px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .pie-chart {
        width: 185px;
        height: 185px;
        border-radius: 50%;
        background: conic-gradient(#18bf86 0deg 180deg, #ff4047 180deg 360deg);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.3),
          0 12px 26px rgba(0, 0, 0, 0.1);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
        cursor: pointer;
      }

      .pie-chart:hover {
        transform: scale(1.035);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.3),
          0 16px 32px rgba(0, 0, 0, 0.14);
      }

      .pie-legend {
        width: 100%;
        max-width: 270px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 2px;
      }

      .pie-legend-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border: 1px solid #d9eeee;
        background: #f8fffd;
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease,
          border-color 0.2s ease;
      }

      .pie-legend-item:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
        border-color: #9de6dd;
      }

      .pie-legend-left {
        display: flex;
        align-items: center;
        gap: 7px;
      }

      .pie-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
      }

      .pie-dot.fakta {
        background: #18bf86;
      }

      .pie-dot.hoaks {
        background: #ff4047;
      }

      .pie-legend-item.fakta {
        color: #07945f;
      }

      .pie-legend-item.hoaks {
        color: #e22f39;
      }

      .performance-summary-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
      }

      .performance-summary-card {
        border: none;
        border-radius: 8px;
        padding: 17px 18px;
        color: #ffffff;
        min-height: 74px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        cursor: pointer;
        text-align: left;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease,
          filter 0.2s ease;
      }

      .performance-summary-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.15);
        filter: brightness(1.03);
      }

      .performance-summary-card:active {
        transform: translateY(0);
      }

      .performance-summary-card span {
        font-size: 12px;
        font-weight: 700;
        opacity: 0.95;
        margin-bottom: 6px;
      }

      .performance-summary-card strong {
        font-size: 24px;
        font-weight: 900;
        line-height: 1;
      }

      .summary-teal {
        background: #08a998;
      }

      .summary-green {
        background: #00bf44;
      }

      .summary-red {
        background: #f91521;
      }

      .summary-orange {
        background: #ff5c00;
      }

      .detail-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(9, 32, 36, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 22px;
        z-index: 1000;
      }

      .detail-modal-overlay.show {
        display: flex;
      }

      .detail-modal {
        width: min(520px, 100%);
        background: #ffffff;
        border-radius: 14px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.25);
        overflow: hidden;
        animation: modalIn 0.2s ease;
      }

      @keyframes modalIn {
        from {
          opacity: 0;
          transform: translateY(10px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .detail-modal-header {
        padding: 18px 20px;
        border-bottom: 1px solid #e2efec;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .detail-modal-header h3 {
        font-size: 18px;
        color: #24333d;
      }

      .detail-close-btn {
        width: 34px;
        height: 34px;
        border: none;
        border-radius: 8px;
        background: #edf8f6;
        color: #087e70;
        cursor: pointer;
        font-size: 20px;
        line-height: 1;
        transition:
          background 0.2s ease,
          transform 0.2s ease;
      }

      .detail-close-btn:hover {
        background: #d9f4ef;
        transform: rotate(90deg);
      }

      .detail-modal-body {
        padding: 20px;
      }

      .detail-modal-body p {
        color: #55676f;
        font-size: 14px;
        line-height: 1.6;
        margin-bottom: 14px;
      }

      .detail-list {
        display: grid;
        gap: 10px;
      }

      .detail-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        background: #f6fffd;
        border: 1px solid #d9eeee;
        border-radius: 10px;
        padding: 11px 12px;
        font-size: 14px;
      }

      .detail-row span {
        color: #5f737b;
      }

      .detail-row strong {
        color: #263238;
      }

      @media (max-width: 1100px) {
        .performance-content {
          grid-template-columns: 1fr;
        }

        .performance-summary-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 760px) {
        .statistics-wrapper {
          padding: 20px;
        }

        .metric-bars {
          gap: 12px;
          padding: 0 10px;
        }

        .metric-bar {
          width: 42px;
        }

        .performance-summary-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <svg
      aria-hidden="true"
      style="position: absolute; width: 0; height: 0; overflow: hidden"
    >
      <symbol id="icon-shield" viewBox="0 0 24 24">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
      </symbol>

      <symbol id="icon-grid" viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7" rx="1"></rect>
        <rect x="14" y="3" width="7" height="7" rx="1"></rect>
        <rect x="3" y="14" width="7" height="7" rx="1"></rect>
        <rect x="14" y="14" width="7" height="7" rx="1"></rect>
      </symbol>

      <symbol id="icon-search" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7"></circle>
        <path d="M21 21l-4.3-4.3"></path>
      </symbol>

      <symbol id="icon-chart" viewBox="0 0 24 24">
        <path d="M4 19V5"></path>
        <path d="M4 19h16"></path>
        <path d="M8 16v-5"></path>
        <path d="M12 16V8"></path>
        <path d="M16 16v-9"></path>
      </symbol>

      <symbol id="icon-database" viewBox="0 0 24 24">
        <ellipse cx="12" cy="5" rx="7" ry="3"></ellipse>
        <path d="M5 5v6c0 1.7 3.1 3 7 3s7-1.3 7-3V5"></path>
        <path d="M5 11v6c0 1.7 3.1 3 7 3s7-1.3 7-3v-6"></path>
      </symbol>

      <symbol id="icon-pulse" viewBox="0 0 24 24">
        <path d="M3 12h4l3-8 4 16 3-8h4"></path>
      </symbol>
    </svg>

    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">
          <svg class="icon"><use href="#icon-shield"></use></svg>
        </div>

        <div>
          <h1>Deteksi Hoaks</h1>
          <p>Sistem Deteksi Hoaks Politik</p>
        </div>
      </div>

      <nav class="menu">
        <a class="menu-item" href="/dashboard">
          <svg class="icon"><use href="#icon-grid"></use></svg>
          Dashboard
        </a>

        <a class="menu-item" href="/analisis-berita">
          <svg class="icon"><use href="#icon-search"></use></svg>
          Analisis Berita
        </a>

        <a class="menu-item active" href="/statistik">
          <svg class="icon"><use href="#icon-chart"></use></svg>
          Statistik
        </a>

        <a class="menu-item" href="/dataset-info">
          <svg class="icon"><use href="#icon-database"></use></svg>
          Dataset Info
        </a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="page-header">
        <h2>Statistik & Performa</h2>
      </header>

      <section class="statistics-wrapper">
        <div class="performance-card-main">
          <div class="performance-title">
            <svg class="icon"><use href="#icon-pulse"></use></svg>
            <h3>Performa Model</h3>
          </div>

          <div class="performance-content">
            <div class="metric-chart-box">
              <h4 class="metric-chart-title">Metrik Evaluasi Model</h4>

              <div class="metric-chart">
                <div class="metric-y-axis">
                  <span>100</span>
                  <span>75</span>
                  <span>50</span>
                  <span>25</span>
                  <span>0</span>
                </div>

                <div class="metric-bars">
                  <div class="metric-bar-item" data-detail="precision">
                    <div
                      id="precisionBar"
                      class="metric-bar"
                      style="height: 0%"
                    ></div>
                    <span>Precision</span>
                  </div>

                  <div class="metric-bar-item" data-detail="recall">
                    <div
                      id="recallBar"
                      class="metric-bar"
                      style="height: 0%"
                    ></div>
                    <span>Recall</span>
                  </div>

                  <div class="metric-bar-item" data-detail="f1">
                    <div id="f1Bar" class="metric-bar" style="height: 0%"></div>
                    <span>F1-Score</span>
                  </div>

                  <div class="metric-bar-item" data-detail="accuracy">
                    <div
                      id="accuracyMetricBar"
                      class="metric-bar"
                      style="height: 0%"
                    ></div>
                    <span>Accuracy</span>
                  </div>
                </div>
              </div>

              <div class="metric-legend">
                <b></b>
                <span>Score (%)</span>
              </div>
            </div>

            <div class="dataset-distribution">
              <h4 class="pie-chart-title">Distribusi Dataset</h4>

              <div class="pie-area">
                <div class="pie-wrap">
                  <div
                    id="datasetPie"
                    class="pie-chart"
                    data-detail="dataset-pie"
                    title="Klik untuk melihat detail distribusi dataset"
                  ></div>
                </div>

                <div class="pie-legend">
                  <button
                    type="button"
                    class="pie-legend-item fakta"
                    data-detail="dataset-fakta"
                  >
                    <span class="pie-legend-left">
                      <span class="pie-dot fakta"></span>
                      <span>Berita Fakta</span>
                    </span>
                    <strong id="pieFaktaLabel">0%</strong>
                  </button>

                  <button
                    type="button"
                    class="pie-legend-item hoaks"
                    data-detail="dataset-hoaks"
                  >
                    <span class="pie-legend-left">
                      <span class="pie-dot hoaks"></span>
                      <span>Berita Hoaks</span>
                    </span>
                    <strong id="pieHoaksLabel">0%</strong>
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div class="performance-summary-grid">
            <button
              type="button"
              class="performance-summary-card summary-teal"
              data-detail="total-predictions"
            >
              <span>Total Prediksi</span>
              <strong id="totalPredictions">0</strong>
            </button>

            <button
              type="button"
              class="performance-summary-card summary-green"
              data-detail="average-accuracy"
            >
              <span>Akurasi Rata-rata</span>
              <strong id="averageAccuracy">0%</strong>
            </button>

            <button
              type="button"
              class="performance-summary-card summary-red"
              data-detail="detected-hoaks"
            >
              <span>Hoaks Terdeteksi</span>
              <strong id="detectedHoaks">0</strong>
            </button>

            <button
              type="button"
              class="performance-summary-card summary-orange"
              data-detail="processing-time"
            >
              <span>Waktu Proses</span>
              <strong id="processingTime">0s</strong>
            </button>
          </div>
        </div>
      </section>

      <footer class="footer">© 2026 Sistem Deteksi Berita Hoaks</footer>
    </main>

    <div id="detailModalOverlay" class="detail-modal-overlay">
      <div class="detail-modal" role="dialog" aria-modal="true">
        <div class="detail-modal-header">
          <h3 id="detailModalTitle">Detail</h3>
          <button type="button" id="detailModalClose" class="detail-close-btn">
            ×
          </button>
        </div>

        <div id="detailModalBody" class="detail-modal-body"></div>
      </div>
    </div>

    <script src="/static/statistik.js"></script>
  </body>
</html>
